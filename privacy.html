<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title data-i18n="privacy.metaTitle">Privacy Policy — CraftLab Studio</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="legal-page">

  <!-- NAV -->
  <nav class="navbar bg-black border-bottom border-secondary">
    <div class="container-fluid px-3 px-lg-4 d-flex justify-content-between">
      <a
        class="navbar-brand text-light text-decoration-none"
        href="index.html"
        data-i18n="privacy.back"
      >
        ← Back
      </a>

      <!-- Language switch (same as main site) -->
      <div class="d-flex gap-2">
        <button class="btn btn-outline-accent btn-sm" data-lang="en">EN</button>
        <button class="btn btn-outline-accent btn-sm" data-lang="es">ES</button>
        <button class="btn btn-outline-accent btn-sm" data-lang="it">IT</button>
      </div>
    </div>
  </nav>

  <!-- CONTENT -->
  <main class="container py-6">
    <h1 class="section-title" data-i18n="privacy.metaTitle"> </h1>

    <p class="text-muted-ivory mt-3" data-i18n="privacy.intro">
    </p>

    <h2 class="h4 mt-4" data-i18n="privacy.collect.title"> </h2>
    <ul class="text-muted-ivory">
      <li data-i18n="privacy.collect.li1"> </li>
      <li data-i18n="privacy.collect.li2"> </li>
      <li data-i18n="privacy.collect.li3"> </li>
    </ul>

    <h2 class="h4 mt-4" data-i18n="privacy.why.title"> </h2>
    <p class="text-muted-ivory" data-i18n="privacy.why.body">
    </p>

    <h2 class="h4 mt-4" data-i18n="privacy.retention.title"> </h2>
    <p class="text-muted-ivory" data-i18n="privacy.retention.body">
    </p>

    <h2 class="h4 mt-4" data-i18n="privacy.third.title"> </h2>
    <p class="text-muted-ivory" data-i18n="privacy.third.body">
    </p>

    <h2 class="h4 mt-4" data-i18n="privacy.rights.title"> </h2>
    <p class="text-muted-ivory">
      <span data-i18n="privacy.rights.body"></span>
      <a href="mailto:info@craftlab-studio.com" class="legal-link">
      </a>
    </p>

    <p class="small text-muted mt-5">
      <span data-i18n="privacy.updated"> </span>
      <span id="d"></span>
    </p>
  </main>

  <footer class="py-5 bg-black border-top border-secondary">
    <div class="container small footer-grid">
      <!-- Left -->
      <div class="footer-left" data-i18n="footer.tagline">
        © <span id="y"></span> CraftLab Studio — Built by hand. Designed with soul.
      </div>

      <!-- Center -->
      <div class="footer-center">
        <a href="mailto:info@craftlab-studio.com" class="footer-link">
          info@craftlab-studio.com
        </a>

        <a
          href="https://www.linkedin.com/company/craftlab-studio-bcn/"
          class="footer-social"
          aria-label="CraftLab Studio on LinkedIn"
        >
          <img
            src="img/linkedin.svg"
            alt="LinkedIn"
            class="footer-icon"
            width="44"
            height="44"
          />
        </a>
        <a
          href="https://www.instagram.com/craftlab.studio.bcn/"
          class="footer-social"
          aria-label="CraftLab Studio on Instagram"
        >
          <img
            src="img/instagram.svg"
            alt="Instagram"
            class="footer-icon"
            width="40"
            height="40"
          />
        </a>
      </div>

      <!-- Right -->
      <div class="footer-right">
        <a href="privacy.html" class="footer-link">Privacy</a>
        <a href="cookies.html" class="footer-link">Cookies</a>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/script.js"></script>
  <script>
    document.getElementById("d").textContent =
    new Date().toISOString().slice(0, 10);
    
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>

</html>
